services:
  mc:
    image: itzg/minecraft-server
    container_name: mc-fabric-smart
    ports:
      - "25565:25565"
    environment:
      TYPE: "FABRIC"
      VERSION: "1.21.10"  # ここでバージョンを指定
      EULA: "TRUE"
      MEMORY: "1G"
      JVM_OPTS: "-Xms512M -Xmx1024M -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1RSetUpdatingPauseTimePercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1"
    volumes:
      - ./data:/data  # 自分のPCの「data」フォルダと同期
    restart: unless-stopped
  ddns-updater:
    image: qmcgaw/ddns-updater
    container_name: ddns-updater
    network_mode: host
    environment:
      - PERIOD=5m
      - PROVIDER=mydns
      - MYDNS_ID=mydns442682  # MyDNSの「mydns123456」みたいなやつ
      - MYDNS_PASSWORD=zfopQpYLZKx
    restart: unless-stopped
